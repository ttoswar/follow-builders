name: Daily Email Digest

on:
  schedule:
    #每天北京时间 10:00 运行 (对应 UTC 02:00)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  send-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "☕ 今日 AI Builder 动态"
          to: ${{ secrets.RECEIVER_EMAIL }}
          # 关键修改：在这里以 < > 的形式拼上你的发件账号变量
          from: "AI Digest Bot <${{ secrets.MAIL_USERNAME }}>" 
          html_body: file://digest.html
